# 软件开发全流程 — 工具选择与经验记录

> 本文件记录每个流程环节的工具选择、使用经验和最佳实践。
> 随着项目推进持续更新，沉淀团队知识。

## 环节工具映射

### 1. 需求分析

```yaml
phase: requirement-analysis
tools:
  - name: AskUserQuestion
    usage: |
      交互式需求收集。通过结构化提问引导用户澄清需求。
      建议：每次只问1-2个问题，避免信息过载。
      用开放式问题开场，用具体场景追问。

  - name: Read
    usage: |
      读取 .ai/product.md 了解现有产品定义。
      读取 .ai/tech.md 了解技术约束。

  - name: Write
    usage: |
      输出PRD文档和需求追踪矩阵到 docs/pipeline/。

  - name: WebSearch
    usage: |
      搜索行业标准和竞品分析，辅助需求分析。
      适用：用户对功能边界不确定时，查找行业最佳实践。

  - name: /product
    usage: |
      如果产品定位尚未定义，先调用 /product Skill 完成产品定义。
      /dev-pipeline 依赖 .ai/product.md 已填写。

lessons:
  - id: L-REQ-001
    title: 需求来源要明确
    description: |
      原始需求可能是模糊的想法，需要通过多轮提问澄清：
      1. 先理解"为什么要做"（背景和动机）
      2. 再理解"做什么"（功能范围）
      3. 最后理解"做到什么程度"（验收标准）
    date: 2026-06-23

  - id: L-REQ-002
    title: 验收标准必须可量化
    description: |
      模糊的验收标准是需求评审被打回的主要原因。
      例：❌ "系统要快" → ✅ "API响应时间P95 < 500ms"
      例：❌ "支持搜索" → ✅ "支持按名称模糊搜索，结果分页，每页20条"
    date: 2026-06-23

  - id: L-REQ-003
    title: 不做列表比做列表更重要
    description: |
      需求蔓延是项目延期的主要原因。明确"不做什么"能有效防止蔓延。
      每个不做项要有明确原因（超出范围/MVP不需要/技术不匹配）。
    date: 2026-06-23
```

### 2. 技术方案设计

```yaml
phase: technical-design
tools:
  - name: Read
    usage: |
      读取 .ai/tech.md、.ai/structure.md、.ai/codeRule.md。
      读取已通过评审的PRD。

  - name: /architect
    usage: |
      如果技术选型和架构设计尚未完成，先调用 /architect Skill。
      /architect 完成交互式技术选型并更新 .ai/ 约束文件。

  - name: Write
    usage: |
      输出技术方案文档、架构图、数据模型、API设计。

  - name: Agent(Explore)
    usage: |
      探索项目现有代码结构，理解已有技术栈和模式。
      适用：项目已有基础代码时，确保新设计与之兼容。

lessons:
  - id: L-TECH-001
    title: 技术选型要有对比分析
    description: |
      每项选型至少比较2个方案，列出优劣。
      不要因为"最新"就选择，要考虑团队熟悉度和生态成熟度。
    date: 2026-06-23

  - id: L-TECH-002
    title: 数据模型要先于接口设计
    description: |
      先设计数据模型（ER图、表结构），再设计API接口。
      数据模型是业务的核心抽象，接口是数据的操作入口。
      数据模型不合理会导致后期大量返工。
    date: 2026-06-23

  - id: L-TECH-003
    title: 安全方案不能事后补
    description: |
      在技术方案阶段就要考虑：认证方式、授权模型、数据加密、
      输入校验策略。安全方案事后补的成本是设计阶段的10倍。
    date: 2026-06-23
```

### 3. 详细设计

```yaml
phase: detailed-design
tools:
  - name: Read
    usage: |
      读取技术方案文档，理解架构和接口设计。
      读取 .ai/structure.md 了解目录结构规范。

  - name: Write
    usage: |
      输出详细设计文档和任务拆分。

  - name: Agent(Plan)
    usage: |
      对于复杂模块，使用 Plan agent 辅助详细设计。
      Plan agent 可以分析代码结构、识别关键文件、考虑架构权衡。

  - name: Mermaid
    usage: |
      使用 Mermaid 语法绘制时序图、类图、状态机图。
      直接嵌入 Markdown 文档中，无需外部工具。

lessons:
  - id: L-DETAIL-001
    title: 任务拆分粒度1-3天
    description: |
      每个任务1-3天完成，太大会导致跟踪困难，太小增加管理开销。
      任务间依赖关系要明确，避免并行开发时的冲突。
    date: 2026-06-23

  - id: L-DETAIL-002
    title: 时序图要覆盖核心流程
    description: |
      至少覆盖所有P0功能的完整流程，包括正常路径和异常路径。
      时序图是开发人员理解业务流程的主要工具。
    date: 2026-06-23
```

### 4. 编码实现

```yaml
phase: coding
tools:
  - name: Write
    usage: |
      创建源代码文件。严格遵循 .ai/structure.md 的目录结构
      和 .ai/codeRule.md 的代码规范。

  - name: Edit
    usage: |
      修改已有文件。使用 Edit 而非 Write 修改文件，
      确保只修改目标部分。

  - name: Read
    usage: |
      读取详细设计文档，确保实现与设计一致。
      读取已有代码，保持风格一致。

  - name: Bash
    usage: |
      运行包管理器安装依赖。
      运行 lint/format 工具检查代码。
      运行测试验证功能。

  - name: Agent
    usage: |
      对于独立模块，可以使用 Agent 并行开发。
      注意：并行开发时使用 worktree 隔离，避免冲突。

  - name: /code-review
    usage: |
      编码完成后，使用 /code-review Skill 进行自审。
      在提交正式代码评审前先自行检查。

lessons:
  - id: L-CODE-001
    title: 先写测试再写实现
    description: |
      对于核心逻辑，推荐 TDD：先写失败测试，再写实现使测试通过。
      这能确保代码可测试，且逻辑正确。
    date: 2026-06-23

  - id: L-CODE-002
    title: 每完成一个模块就自测
    description: |
      不要等全部写完再测。每完成一个模块/功能点就运行测试。
      问题发现越早，修复成本越低。
    date: 2026-06-23

  - id: L-CODE-003
    title: 遵循项目规范比个人习惯重要
    description: |
      严格按照 .ai/codeRule.md 编码，不要引入个人风格。
      统一的代码风格比"更优雅"的个人风格更有价值。
    date: 2026-06-23
```

### 5. 测试

```yaml
phase: testing
tools:
  - name: Bash
    usage: |
      运行单元测试和集成测试。
      使用项目配置的测试框架执行。

  - name: Write
    usage: |
      编写测试代码。测试代码同样遵循规范。
      输出测试报告到 docs/pipeline/。

  - name: Agent
    usage: |
      使用 Agent 辅助生成测试用例，提高覆盖率。
      特别适合边界条件和异常路径的测试。

  - name: /verify
    usage: |
      使用 /verify Skill 验证代码变更的实际效果。
      启动应用并观察行为是否符合预期。

lessons:
  - id: L-TEST-001
    title: 测试金字塔原则
    description: |
      单元测试(多) > 集成测试(中) > E2E测试(少)。
      单元测试覆盖核心逻辑，集成测试验证模块交互，
      E2E测试验证用户关键路径。
    date: 2026-06-23

  - id: L-TEST-002
    title: 测试边界条件和异常路径
    description: |
      正常路径的测试最容易写，但Bug往往在边界条件和异常路径。
      重点测试：空值、越界、并发、超时、网络异常。
    date: 2026-06-23

  - id: L-TEST-003
    title: 缺陷要分级管理
    description: |
      P0: 功能完全不可用 → 必须修复
      P1: 功能严重受损 → 必须修复
      P2: 功能轻微受损 → 可带遗留发布
      P3: 体验问题 → 后续版本修复
    date: 2026-06-23

  - id: L-TEST-004
    title: 自动化测试全绿≠系统可用
    description: |
      集成测试使用H2内存数据库+MockBean模拟外部依赖，与真实环境差异巨大。
      MVP部署时额外发现5个问题（Dockerfile路径、JWT_SECRET、logback、Flyway、tsconfig），
      自动化测试全绿但一个都没捕获。
      根因：自动化测试没有验证真实基础设施环境。
      对策：集成测试后必须有人工测试环节，在真实环境中验证端到端流程。
    date: 2026-06-25
    source: 项目实践-MVP部署复盘

  - id: L-TEST-005
    title: 人工测试必须以用户故事为单位
    description: |
      人工测试不能只是调用几个API验证返回值，必须以用户故事为单位，
      模拟真实用户操作流程（如：注册→登录→创建知识库→上传文档→等待处理→发起对话）。
      用户故事维度的测试才能发现流程衔接中的问题。
    date: 2026-06-25
    source: 项目实践-MVP上线验证复盘

  - id: L-TEST-006
    title: 人工测试前必须刷新用户手册
    description: |
      用户手册是人工测试的重要参考。代码变更后用户手册可能过时，
      必须在人工测试前调用 /user-manual Skill 刷新，确保测试引导与当前代码一致。
    date: 2026-06-25
    source: 项目实践-复盘改进
```

### 5.5 人工测试

```yaml
phase: manual-testing
tools:
  - name: /user-manual
    usage: |
      人工测试前必须调用 /user-manual Skill 刷新用户手册。
      生成的用户手册作为人工测试的参考文档。
      确保测试引导与当前代码状态一致。

  - name: Bash
    usage: |
      启动服务（docker compose up 或本地启动）。
      重启服务（修复问题后）。
      检查服务健康状态。

  - name: Write
    usage: |
      生成人工测试引导文档（基于用户故事的测试场景）。
      生成人工测试报告（测试结果汇总）。

  - name: Edit
    usage: |
      修复人工测试发现的问题。
      修复后直接重启服务继续测试。

  - name: AskUserQuestion
    usage: |
      收集人工测试反馈。逐个用户故事确认测试结果。
      发现问题时确认问题描述和严重度。

lessons:
  - id: L-MANUAL-001
    title: 人工测试是自动化测试的必要补充
    description: |
      自动化测试验证"代码逻辑正确"，人工测试验证"系统真实可用"。
      两者互补，不能互相替代。缺少人工测试的流程，
      会导致"测试全绿但系统不可用"的问题流入生产环境。
    date: 2026-06-25
    source: 项目实践-MVP复盘

  - id: L-MANUAL-002
    title: 修复后直接验证不走完整流程
    description: |
      人工测试发现问题时，修复代码后直接重启服务继续人工测试，
      无需重新走编码→测试→评审的完整流程。
      这是因为人工测试阶段的问题通常是小的配置或逻辑问题，
      不需要重新评审整体代码质量。
    date: 2026-06-25
    source: 项目实践-复盘改进

  - id: L-MANUAL-003
    title: 追加人工测试无需重走流程
    description: |
      已完成的流程可通过 /dev-pipeline phase=manual-test 追加人工测试。
      适用于：流程完成后发现系统不可用、或复盘后决定补充人工测试。
      追加模式下，只执行人工测试环节，不影响已完成的流程状态。
    date: 2026-06-25
    source: 项目实践-复盘改进

  - id: L-MANUAL-004
    title: 全局异常处理器不能掩盖真实错误
    description: |
      把404/401/403/500统一返回"系统繁忙"是最危险的做法：
      1. 所有调试线索消失，开发者和用户无法判断问题所在
      2. 前端API路径错误（404）和认证失败（401）都被当成服务器错误
      3. 正确做法：404返回"资源不存在"、401返回"未认证"、403返回"无权限"
      4. 只有真正的未预期500才返回"系统繁忙"
      本次V1人工测试中5个"系统繁忙"问题，4个根因是404/401/权限，不是真的服务器故障。
    date: 2026-06-28
    source: 项目实践-V1人工测试R1修复

  - id: L-MANUAL-005
    title: 前后端API路径必须对齐
    description: |
      前端写API路径时必须对照后端Controller的@RequestMapping，不能凭直觉命名。
      连字符风格(eval-sets)和路径层级风格(eval/sets)极易混淆。
      本次V1人工测试中评测集接口全部报错，根因就是前端调/eval-sets而后端是/eval/sets。
      对策：编码时前端API文件和后端Controller对照编写，不能只凭记忆。
    date: 2026-06-28
    source: 项目实践-V1人工测试R1修复

  - id: L-MANUAL-006
    title: Controller的getCurrentTenantId必须做null检查
    description: |
      SecurityUtil.getCurrentTenantId()从ThreadLocal获取tenantId，任何Filter执行时序问题
      都可能导致null。如果null传入JPA查询，会抛运行时异常被全局异常处理器兜底返回"系统繁忙"。
      对策：所有Controller统一使用requireCurrentTenantId()模式，null时抛BizException(UNAUTHORIZED)。
      本次V1人工测试中StatController和EvalController都缺少null检查。
    date: 2026-06-28
    source: 项目实践-V1人工测试R1修复

  - id: L-MANUAL-007
    title: 硬编码和TODO注释是定时炸弹
    description: |
      LlmConfigController.getCurrentTenantId()硬编码返回1L，注释写着"TODO: 从JWT解析"，
      但V1发布时未替换，导致所有租户共享tenantId=1的LLM配置，严重违反多租户隔离。
      对策：编码阶段必须清除所有硬编码和TODO，或至少在代码评审时列为blocker项。
      另：权限校验不能只写在注释里（"仅管理员可操作"），必须在代码中实现。
    date: 2026-06-28
    source: 项目实践-V1人工测试R1修复

  - id: L-MANUAL-008
    title: JPQL CAST在PG上不可靠
    description: |
      JPQL 的 CAST(expr AS type) 在 Hibernate + PostgreSQL 组合下行为不一致：
      1. CAST(timestamp AS date) 可能抛异常或返回非预期类型
      2. H2 内存库测试通过但 PostgreSQL 上失败（H2 宽容，PG 严格）
      3. 对策：涉及日期函数的聚合查询改用 native query，使用数据库原生函数
      4. native query 返回类型多样（BigInteger/BigDecimal/Long/Integer），必须用 toLong() 安全转换
    date: 2026-06-28
    source: 项目实践-V1人工测试R4修复

  - id: L-MANUAL-009
    title: iframe动态script需全属性
    description: |
      在 iframe 中通过 createElement('script') 动态加载 widget.js 时：
      1. 必须同时设置 data-api-key、data-token、data-api-url 三个属性
      2. 缺少任一属性可能导致 ChatWidget 初始化参数不完整，组件渲染但无法交互
      3. 增加 console.log 调试日志，便于在浏览器 DevTools 中定位 iframe 内部问题
    date: 2026-06-28
    source: 项目实践-V1人工测试R4修复

  - id: L-MANUAL-010
    title: localStorage role需同步
    description: |
      Pinia store 的 role 从 localStorage 初始化，但组件挂载时可能读取到过时值：
      1. 用户切换账号后，localStorage 已更新但 userStore.role 可能延迟
      2. AppLayout.onMounted 中应主动同步 localStorage role → userStore.role
      3. 这确保菜单权限（v-if="userStore.isAdmin"）与最新登录状态一致
    date: 2026-06-28
    source: 项目实践-V1人工测试R4修复

  - id: L-MANUAL-011
    title: 虚拟线程JPA需独立事务
    description: |
      Thread.startVirtualThread() 不继承 Spring 事务上下文，JPA 操作在虚拟线程中可能因无 EntityManager 而失败。
      对策：将虚拟线程中需要的 JPA 操作抽取到独立 Service Bean，使用 @Transactional(propagation = REQUIRES_NEW)。
      这是 Spring AOP 代理限制的直接应用：同类内部调用不触发 @Transactional。
      本次评测执行三轮未修复，根因就是虚拟线程中 JPA save 操作无事务管理。
    date: 2026-06-28
    source: 项目实践-V1人工测试R5修复

  - id: L-MANUAL-012
    title: 外部调用需完全容错
    description: |
      评测执行依赖 Milvus/Embedding 等外部服务，这些服务不可用时不应导致整个评测流程中断。
      对策：将 retrievalService.retrieve() 包装为 safeRetrieve()，异常时返回空列表而非抛异常。
      三轮未修复的评测问题，根因就是 Milvus 不可用时 retrievalService 直接抛异常。
      "检索失败 = 未命中" 比 "检索失败 = 评测崩溃" 合理得多。
    date: 2026-06-28
    source: 项目实践-V1人工测试R5修复

  - id: L-MANUAL-013
    title: iframe中currentScript不可靠
    description: |
      document.currentScript 在 iframe 中动态加载的 script 上可能返回 null（某些浏览器特别是 Edge）。
      对策：在 iframe 中使用 window.__DOCCHAT_CONFIG__ 全局变量传递配置，优先级高于 dataset。
      预览窗口反复变空白四轮，根因就是 currentScript 失效导致 apiKey/token 全为空，ChatWidget 静默退出。
    date: 2026-06-28
    source: 项目实践-V1人工测试R5修复

  - id: L-MANUAL-014
    title: LLM token量需从SSE提取
    description: |
      Anthropic API 在 SSE 响应中通过 message_start.usage.input_tokens 和 message_delta.usage.output_tokens 返回 token 使用量。
      如果不提取这些信息，用量统计中 Token 消耗永远为 0。
      对策：LlmService.streamChat() 返回 TokenUsage，通过 AuthContext 传递给 ChatStatAspect。
    date: 2026-06-28
    source: 项目实践-V1人工测试R5修复

  - id: L-MANUAL-015
    title: 权限检查需双重校验
    description: |
      Pinia store 的响应式更新可能有延迟（特别是用户切换账号时），导致 v-if 条件读到过时值。
      对策：computed 属性同时检查 userStore.role 和 localStorage.getItem('role')，
      任一条件满足才显示管理员菜单。watch 监听 role 变化自动同步 localStorage。
    date: 2026-06-28
    source: 项目实践-V1人工测试R5修复
```
```

### 6. 部署上线

```yaml
phase: deployment
tools:
  - name: Bash
    usage: |
      执行部署命令、数据库迁移、服务启动等。
      建议将部署步骤脚本化，避免手动操作。

  - name: Write
    usage: |
      输出部署方案和部署记录。

  - name: /verify
    usage: |
      部署后验证功能是否正常。

  - name: WebFetch/WebSearch
    usage: |
      查询部署环境文档和配置指南。
      适用：不熟悉的部署平台或工具。

lessons:
  - id: L-DEPLOY-001
    title: 部署前必须有回滚方案
    description: |
      每次部署都必须有明确的回滚方案。
      回滚方案要提前测试验证，不能只是"理论上可行"。
    date: 2026-06-23

  - id: L-DEPLOY-002
    title: 灰度发布降低风险
    description: |
      如果条件允许，先部署到少量用户验证，
      确认无问题后再全量发布。
      对于内部系统可简化为：先部署到测试环境验证，再上生产。
    date: 2026-06-23

  - id: L-DEPLOY-003
    title: 数据迁移要可重入
    description: |
      数据迁移脚本必须支持重复执行（幂等）。
      迁移失败后可以安全重试，不会造成数据不一致。
    date: 2026-06-23

  - id: L-DEPLOY-004
    title: 编译通过≠能运行
    description: |
      编译通过不代表应用能正常启动运行。常见原因：
      1. 目录名与Java包名不一致（javac宽松但Spring扫描会Bean冲突）
      2. Flyway迁移脚本有隐式类型转换问题
      3. 数据库密码等配置与基础设施不匹配
      必须实际启动应用验证，不能只看编译结果。
    date: 2026-06-24
    source: 项目实践-G4代码评审回退

  - id: L-DEPLOY-005
    title: G4必须包含启动验证
    description: |
      代码评审(G4)必须包含「编译构建通过」和「应用启动正常」两个blocker检查项。
      没有这两个检查项，代码写了一堆编译错误或运行时崩溃也能通过评审。
      本次发现：缺少检查项导致代码虽然编译通过但Bean重复注册（目录名/包名不一致），
      应用根本启动不了，却已流转到单元测试环节。
    date: 2026-06-24
    source: 项目实践-G4检查清单漏洞

  - id: L-DEPLOY-006
    title: Docker部署必读：完整重建三步法
    description: |
      🚨 本项目反复出现"容器运行旧代码"问题，MVP和V1共发生8+次。
      每次修复代码后忘记/跳过重建步骤，导致人工测试验证的是旧版本。

      === 绝对完整重建步骤（不可省略任何一步）===

      步骤1：构建所有产物（3个构建目标，按顺序执行）

        # 1a. 后端JAR
        cd server && mvn clean package -DskipTests -q && cd ..

        # 1b. chat-widget组件（前端+组件都依赖）
        cd packages/chat-widget && npx vite build && cd ../..

        # 1c. 复制widget产物到server静态资源（Docker构建会用到）
        cp packages/chat-widget/dist/widget.js server/src/main/resources/static/widget.js
        cp packages/chat-widget/dist/widget.css server/src/main/resources/static/widget.css

        # 1d. 前端dist（必须在chat-widget之后，因为引用widget产物）
        cd web && npx vite build && cd ..

      步骤2：重建Docker镜像（必须加--no-cache，否则Docker缓存导致旧产物被打包）

        docker compose build --no-cache server web

      步骤3：重启容器并验证

        docker compose up -d server web
        # 等待启动完成后验证
        docker compose logs server --tail 5 | grep "Started"

      === 为什么每一步都不可省略 ===

      - 省略1a：server容器运行旧的JAR，后端代码修改无效
      - 省略1b：chat-widget修改无效，浏览器加载的是旧widget.js/css
      - 省略1c：Docker镜像中的server静态资源是旧的，widget预览页面用旧文件
      - 省略1d：web容器运行旧的前端dist，前端代码修改无效
      - 省略--no-cache：Docker构建缓存导致即使产物已更新，镜像中仍打包旧产物
        （这是最隐蔽的问题：Docker的layer缓存机制会复用未变化的层）
      - 省略up -d：即使镜像已重建，容器仍运行旧镜像，必须recreate

      === 快速判断：哪些修改需要重建哪些镜像 ===

      | 修改范围 | 需要重建 | 步骤 |
      |---------|---------|------|
      | 只改后端Java代码 | server | 1a → 2(server) → 3 |
      | 只改前端Vue代码 | web | 1d → 2(web) → 3 |
      | 只改chat-widget | server + web | 1b → 1c → 1d → 2 → 3 |
      | 改后端+前端 | server + web | 1a → 1b → 1c → 1d → 2 → 3 |
      | 改了不确定范围 | server + web | 全部执行，宁可多构建不可漏 |

      === 首次部署（从零开始） ===

      1. 确认Docker Desktop运行中
      2. 构建所有产物（步骤1全部执行）
      3. 启动基础设施：docker compose up -d postgres redis etcd minio milvus
      4. 等待基础设施健康（约60-90秒）：docker compose ps 确认全部 healthy
      5. 重建并启动后端：docker compose build --no-cache server && docker compose up -d server
      6. 等待Spring Boot启动（约30秒）：docker compose logs server --tail 5 | grep "Started"
      7. 重建并启动前端：docker compose build --no-cache web && docker compose up -d web
      8. 验证所有服务：docker compose ps

      === 本地开发模式（不走Docker，用Vite dev server） ===

      后端：cd server && mvn spring-boot:run
      前端：cd web && npx vite dev
      组件：cd packages/chat-widget && npx vite build --watch
      注意：本地模式也需要在chat-widget修改后重新build，因为web引用dist产物
    date: 2026-06-28
    source: 项目实践-MVP+V1共8次容器版本不最新问题复盘
    severity: critical
    recurrence: 8+

  - id: L-DEPLOY-007
    title: 代码修改后必须重建+重启
    description: |
      🚨 本项目最高频问题：修改代码后忘记重建Docker镜像和重启容器。

      规则：任何代码修改（Java/Vue/TypeScript/配置文件）生效到Docker容器中，
      必须执行完整的"构建→重建镜像→重启容器→验证"链路。
      仅仅修改源码文件不会自动更新运行中的容器。

      判断矩阵：
      - 修改了 server/ 下的任何文件 → 必须 mvn clean package + docker compose build --no-cache server + docker compose up -d server
      - 修改了 web/ 下的任何文件 → 必须 vite build + docker compose build --no-cache web + docker compose up -d web
      - 修改了 packages/chat-widget/ 下的任何文件 → 必须重建widget + 复制到server/static + 重建server和web两个镜像
      - 修改了 docker/ 下的任何文件 → 必须 docker compose build --no-cache 对应服务
      - 修改了 application.yml/application-dev.yml → 必须重建server镜像（配置打包在JAR中）

      禁止的操作：
      ❌ 修改代码后直接验证，不重建不重启
      ❌ 只执行 docker compose up -d 而不先 build（不会重建镜像）
      ❌ 执行 docker compose build 不加 --no-cache（可能使用缓存层中的旧产物）
      ❌ 只重启后端不重启前端（或反之），当不确定影响范围时必须两个都重建
    date: 2026-06-28
    source: 项目实践-V1 R4 D2"R3修复后服务未重启"
    severity: critical
    recurrence: 8+
```

## 经验记录规范

新增经验记录时，请遵循以下格式：

```yaml
- id: L-{PHASE}-{SEQ}
  title: 简明标题（10字以内）
  description: |
    经验描述：
    1. 具体做法
    2. 为什么这样做
    3. 不这样做的后果
  date: YYYY-MM-DD
  source: 发现来源（项目实践/行业经验/事故复盘）
```

