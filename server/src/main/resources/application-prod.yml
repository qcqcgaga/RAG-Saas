spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

milvus:
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT}

xunfei:
  api-url: ${XUNFEI_API_URL}
  api-key: ${XUNFEI_API_KEY}

logging:
  level:
    root: WARN
    com.docchat: INFO
