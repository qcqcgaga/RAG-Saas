server:
  port: 8080

spring:
  application:
    name: docchat-server

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    com.docchat: DEBUG

docchat:
  jwt:
    secret: ${JWT_SECRET:changeme-use-env-var-in-prod}
    expiration: ${JWT_EXPIRATION:86400}
  storage:
    path: ${STORAGE_PATH:./uploads}
  milvus:
    uri: ${MILVUS_URI:http://localhost:19530}
