server:
  port: 8080

spring:
  application:
    name: docchat-server

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    com.docchat: DEBUG

docchat:
  jwt:
    secret: ${JWT_SECRET:changeme-use-env-var-in-prod}
    expiration: ${JWT_EXPIRATION:86400}
  storage:
    path: ${STORAGE_PATH:./uploads}
  milvus:
    uri: ${MILVUS_URI:http://localhost:19530}
  llm:
    api-url: ${LLM_API_URL:https://maas-coding-api.cn-huabei-1.xf-yun.com/anthropic/v1/messages}
    api-key: ${LLM_API_KEY:}
    model-name: ${LLM_MODEL:astron-code-latest}
    max-tokens: ${LLM_MAX_TOKENS:2048}
  widget:
    base-url: ${WIDGET_BASE_URL:http://localhost:8080}
