<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocChat 聊天组件测试页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 { margin-bottom: 8px; font-size: 24px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .info-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .info-box h2 { font-size: 16px; margin-bottom: 12px; }
    .info-box p { line-height: 1.6; color: #555; }
    .info-box code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }
    .step { margin-bottom: 12px; padding-left: 24px; position: relative; }
    .step::before {
      content: attr(data-step);
      position: absolute;
      left: 0;
      top: 0;
      font-weight: bold;
      color: #1890ff;
    }
    .note {
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 6px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 14px;
      color: #ad6800;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DocChat 聊天组件测试页</h1>
    <p class="subtitle">用于验证嵌入式聊天组件是否正常工作</p>

    <div class="info-box">
      <h2>📋 测试步骤</h2>
      <div class="step" data-step="1.">
        <p>先在 <a href="http://localhost" target="_blank">管理后台</a> 注册/登录，确保知识库中有已处理的文档</p>
      </div>
      <div class="step" data-step="2.">
        <p>进入 <strong>聊天组件</strong> 页面，复制嵌入脚本代码</p>
      </div>
      <div class="step" data-step="3.">
        <p>将脚本粘贴到下方 <code>&lt;!-- 在此粘贴嵌入脚本 --&gt;</code> 位置</p>
      </div>
      <div class="step" data-step="4.">
        <p>保存文件后在浏览器中打开此页面，右下角应出现聊天图标</p>
      </div>
      <div class="step" data-step="5.">
        <p>点击图标，输入问题，验证对话功能</p>
      </div>
    </div>

    <div class="info-box">
      <h2>🔗 管理后台</h2>
      <p>访问 <a href="http://localhost" target="_blank">http://localhost</a> 管理文档和组件配置</p>
    </div>

    <div class="note">
      ⚠️ 注意：当前 MVP 版本 Embedding 使用随机向量占位、LLM 使用模拟流式占位，对话返回的不是真实 AI 回答，但可以验证流式响应格式和来源引用结构是否正确。
    </div>
  </div>
  <script src="http://localhost/widget.js" data-token="283c1d21d8fa4ae5a60b767d310f3148" data-api-url="http://localhost"></script>
  <!-- 在此粘贴嵌入脚本 -->
  <!-- 例如: <script src="http://localhost:8080/widget.js" data-token="your-widget-token" data-api-url="http://localhost:8080"></script> -->
  
</body>
</html>
